<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 면접 코디네이터</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .loading-spinner { border-top-color: #2563EB; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('GEMINI_API_KEY') || '');
            const [showKeyInput, setShowKeyInput] = useState(!apiKey);
            const [userImage, setUserImage] = useState(null);
            const [clothingImage, setClothingImage] = useState(null);
            const [displayImage, setDisplayImage] = useState(null);
            const [evaluation, setEvaluation] = useState(null);
            const [loading, setLoading] = useState(false);

            const userFileRef = useRef(null);
            const clothingFileRef = useRef(null);

            // Lucide 아이콘 렌더링
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [loading, evaluation, showKeyInput]);

            const saveApiKey = (e) => {
                e.preventDefault();
                localStorage.setItem('GEMINI_API_KEY', apiKey);
                setShowKeyInput(false);
            };

            const handleFileUpload = (e, type) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        if (type === 'user') { setUserImage(reader.result); setDisplayImage(reader.result); }
                        else { setClothingImage(reader.result); }
                    };
                    reader.readAsDataURL(file);
                }
            };

            const onEvaluate = async () => {
                if (!apiKey) { setShowKeyInput(true); return; }
                setLoading(true);
                // 데모를 위한 지연 시간 (실제 API 호출 시에는 fetch 로직이 들어갑니다)
                setTimeout(() => {
                    setEvaluation({
                        score: 92,
                        tags: ["신뢰감", "깔끔한", "정석면접룩"],
                        silhouette: "전반적으로 핏이 아주 훌륭합니다. 어깨선이 잘 맞아서 단정한 인상을 줍니다.",
                        advice: "넥타이 매듭을 조금 더 단단하게 매시면 완벽할 것 같습니다."
                    });
                    setLoading(false);
                }, 2000);
            };

            return (
                <div className="min-h-screen pb-10">
                    {/* API Key Modal */}
                    {showKeyInput && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <form onSubmit={saveApiKey} className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
                                <h2 className="text-xl font-bold mb-2">Gemini API Key</h2>
                                <p className="text-sm text-gray-500 mb-6">특강 실습을 위해 키를 입력해주세요.</p>
                                <input 
                                    type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)}
                                    placeholder="AI Studio에서 받은 키 붙여넣기"
                                    className="w-full border-2 border-gray-100 p-4 rounded-2xl mb-4 outline-none focus:border-blue-500 transition-all"
                                />
                                <button className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200">시작하기</button>
                            </form>
                        </div>
                    )}

                    <header className="bg-white/80 backdrop-blur-md border-b px-6 py-4 sticky top-0 z-10 flex items-center justify-between">
                        <h1 className="text-xl font-black text-blue-600 flex items-center gap-2">👔 AI Fit-Test</h1>
                        <button onClick={() => setShowKeyInput(true)} className="p-2 text-gray-400"><i data-lucide="settings"></i></button>
                    </header>

                    <main className="max-w-md mx-auto p-4 space-y-6">
                        <div className="grid grid-cols-2 gap-4">
                            <div onClick={() => userFileRef.current.click()} className="aspect-square bg-white border-2 border-dashed rounded-3xl flex flex-col items-center justify-center cursor-pointer overflow-hidden relative border-gray-200">
                                {userImage ? <img src={userImage} className="w-full h-full object-cover" /> : <div className="text-center"><i data-lucide="user" className="mx-auto text-gray-300 mb-1"></i><span className="text-[10px] text-gray-400 font-bold uppercase">My Photo</span></div>}
                                <input type="file" ref={userFileRef} className="hidden" onChange={(e) => handleFileUpload(e, 'user')} />
                            </div>
                            <div onClick={() => clothingFileRef.current.click()} className="aspect-square bg-white border-2 border-dashed rounded-3xl flex flex-col items-center justify-center cursor-pointer overflow-hidden relative border-gray-200">
                                {clothingImage ? <img src={clothingImage} className="w-full h-full object-cover" /> : <div className="text-center"><i data-lucide="shirt" className="mx-auto text-gray-300 mb-1"></i><span className="text-[10px] text-gray-400 font-bold uppercase">Outfit</span></div>}
                                <input type="file" ref={clothingFileRef} className="hidden" onChange={(e) => handleFileUpload(e, 'clothing')} />
                            </div>
                        </div>

                        <div className="flex gap-2">
                            <button onClick={onEvaluate} className="flex-1 bg-white border-2 border-gray-100 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-sm text-gray-700">현재 복장 평가</button>
                            <button className="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-lg shadow-blue-100">의상 합성</button>
                        </div>

                        <div className="relative aspect-[3/4] bg-white rounded-[2rem] shadow-2xl overflow-hidden border-4 border-white">
                            {displayImage ? <img src={displayImage} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-gray-300 italic">No image selected</div>}
                            {loading && (
                                <div className="absolute inset-0 bg-white/80 flex items-center justify-center flex-col gap-4">
                                    <div className="w-12 h-12 border-4 border-gray-100 loading-spinner rounded-full"></div>
                                    <p className="font-bold text-blue-600 animate-pulse">AI 전문가가 분석 중...</p>
                                </div>
                            )}
                        </div>

                        {evaluation && (
                            <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-slate-900 p-8 rounded-[2rem] text-white shadow-xl">
                                    <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Professionalism Score</p>
                                    <div className="flex items-baseline gap-2 mb-6">
                                        <span className="text-6xl font-black">{evaluation.score}</span>
                                        <span className="text-xl text-slate-600">/100</span>
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        {evaluation.tags.map((tag, i) => <span key={i} className="px-4 py-1.5 bg-slate-800 rounded-full text-xs font-bold text-blue-400"># {tag}</span>)}
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border border-gray-100">
                                    <h3 className="text-xs font-black text-gray-400 uppercase mb-3">Silhouette & Advice</h3>
                                    <p className="text-sm text-gray-700 leading-relaxed mb-4">{evaluation.silhouette}</p>
                                    <div className="p-4 bg-blue-50 rounded-xl text-sm text-blue-700 font-medium">💡 {evaluation.advice}</div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
