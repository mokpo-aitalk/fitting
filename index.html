<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 면접 코디네이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        <header class="p-5 border-b flex justify-between items-center bg-white sticky top-0 z-10">
            <h1 class="text-xl font-bold text-blue-600">👔 AI Fit-Test</h1>
            <button onclick="toggleSettings()" class="text-gray-400 text-sm">설정</button>
        </header>

        <div id="settingsPanel" class="hidden p-5 bg-blue-50 border-b">
            <p class="text-xs font-bold mb-2 text-blue-700">Gemini API Key</p>
            <input type="password" id="apiKeyInput" placeholder="키를 입력하세요" class="w-full p-2 border rounded-lg text-sm mb-2">
            <button onclick="saveKey()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-bold">저장</button>
        </div>

        <main class="p-4 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div onclick="document.getElementById('userFile').click()" class="aspect-square bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center cursor-pointer overflow-hidden">
                    <div id="userPlaceholder">
                        <p class="text-[10px] text-gray-400 font-bold">나의 사진</p>
                    </div>
                    <img id="userPreview" class="hidden w-full h-full object-cover">
                    <input type="file" id="userFile" class="hidden" accept="image/*" onchange="previewImg(this, 'user')">
                </div>
                <div onclick="document.getElementById('outfitFile').click()" class="aspect-square bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center cursor-pointer overflow-hidden">
                    <div id="outfitPlaceholder">
                        <p class="text-[10px] text-gray-400 font-bold">의상 사진</p>
                    </div>
                    <img id="outfitPreview" class="hidden w-full h-full object-cover">
                    <input type="file" id="outfitFile" class="hidden" accept="image/*" onchange="previewImg(this, 'outfit')">
                </div>
            </div>

            <div class="flex gap-2">
                <button onclick="startAnalyze()" class="flex-1 bg-gray-800 text-white py-4 rounded-2xl font-bold active:scale-95 transition-transform">현재 복장 평가</button>
                <button onclick="startAnalyze()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold active:scale-95 transition-transform shadow-lg">의상 합성</button>
            </div>

            <div class="relative aspect-[3/4] bg-gray-100 rounded-[2rem] overflow-hidden border-4 border-white shadow-inner flex items-center justify-center">
                <div id="emptyMsg" class="text-gray-300 italic text-sm text-center p-10">사진을 등록하고<br>평가 버튼을 눌러주세요</div>
                <img id="mainView" class="hidden w-full h-full object-cover">
                
                <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/80 flex flex-col items-center justify-center gap-3">
                    <div class="spinner"></div>
                    <p class="text-blue-600 font-bold text-sm">AI 분석 중...</p>
                </div>
            </div>

            <div id="reportArea" class="hidden space-y-4 pb-10">
                <div class="bg-gray-900 p-6 rounded-3xl text-white">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Professionalism Score</p>
                    <div class="flex items-baseline gap-1">
                        <span class="text-5xl font-black">92</span>
                        <span class="text-lg text-gray-600">/100</span>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <h3 class="text-xs font-black text-gray-400 uppercase mb-2">AI 분석 결과</h3>
                    <p class="text-sm text-gray-600 leading-relaxed">
                        전반적으로 깔끔한 인상을 줍니다. 셔츠의 깃이 정돈되어 있어 신뢰감을 주기에 충분합니다. 넥타이의 색상도 조화롭습니다.
                    </p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 초기 설정
        const apiKey = localStorage.getItem('GEMINI_API_KEY');
        if(!apiKey) document.getElementById('settingsPanel').classList.remove('hidden');

        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('hidden');
        }

        function saveKey() {
            const val = document.getElementById('apiKeyInput').value;
            if(val) {
                localStorage.setItem('GEMINI_API_KEY', val);
                alert('API 키가 저장되었습니다.');
                toggleSettings();
            }
        }

        function previewImg(input, type) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById(type + 'Preview');
                    const placeholder = document.getElementById(type + 'Placeholder');
                    const mainView = document.getElementById('mainView');
                    const emptyMsg = document.getElementById('emptyMsg');

                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');

                    if(type === 'user') {
                        mainView.src = e.target.result;
                        mainView.classList.remove('hidden');
                        emptyMsg.classList.add('hidden');
                    }
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function startAnalyze() {
            const loader = document.getElementById('loadingOverlay');
            const report = document.getElementById('reportArea');
            
            loader.classList.remove('hidden');
            report.classList.add('hidden');

            // 2초 뒤 결과 표시 (시뮬레이션)
            setTimeout(() => {
                loader.classList.add('hidden');
                report.classList.remove('hidden');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 2000);
        }
    </script>
</body>
</html>
